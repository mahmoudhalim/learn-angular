<div class="container mx-auto py-8 px-4">
  <div class="grid grid-cols-12 gap-4">
    @for (p of products; track p.id) {
      <app-product-card class="col-span-12 sm:col-span-6 md:col-span-4">
        <img
          class="h-full w-full object-cover"
          [src]="p.image"
          [alt]="p.name"
        />

        <h2 class="card-title mr-2">{{ p.name }}</h2>

        <span class="badge badge-soft" [class]="p.inStock ? 'badge-success' : 'badge-error'">
          {{ p.inStock ? 'in Stock' : 'Out of Stock' }}
        </span>

        <p class="text-md font-bold" [class]="p.basePrice > 100 ? 'text-error' : 'text-success'">
          L.E {{ p.basePrice }}
        </p>

        <button class="btn btn-accent" [disabled]="!p.inStock">Add to Cart</button>
      </app-product-card>
    }
  </div>
</div>
