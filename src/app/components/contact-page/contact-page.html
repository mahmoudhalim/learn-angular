<div class="container mx-auto px-4 py-8 max-w-2xl">
  <h1 class="text-3xl font-bold text-center mb-8">Contact Us</h1>

  <form class="card bg-base-100 shadow-md p-6">
    <div class="form-control mb-4">
      <label class="label">
        <span class="label-text">Name</span>
      </label>
      <input type="text" placeholder="Your name" class="input input-bordered w-full" />
    </div>

    <div class="form-control mb-4">
      <label class="label">
        <span class="label-text">Email</span>
      </label>
      <input type="email" placeholder="your@email.com" class="input input-bordered w-full" />
    </div>

    <div class="form-control mb-6">
      <label class="label">
        <span class="label-text">Message</span>
      </label>
      <textarea
        placeholder="Your message"
        class="textarea textarea-bordered w-full h-32"
      ></textarea>
    </div>

    <button class="btn btn-primary w-full">Send Message</button>
  </form>
</div>
